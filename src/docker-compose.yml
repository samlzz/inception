services:
    mariadb:
        container_name: mariadb
        build: ./requirements/mariadb
        image: mariadb
        env_file: .env
        volumes:
            - mariadb_data:/var/lib/mysql
        networks:
            - inception
        secrets:
          - mysql_root_password
          - mysql_password
        restart: always
        healthcheck:
          test: ["CMD", "nc", "-zv", "mariadb", "3306"]
          interval: 1s
          timeout: 5s
          retries: 10
    
    wordpress:
        container_name: wordpress
        build: ./requirements/wordpress
        image: wordpress
        env_file: .env
        volumes:
            - wordpress_data:/var/www/html
        networks:
            - inception
        depends_on:
            - mariadb
        secrets:
          - mysql_password
          - wp_admin_password
          - wp_user_password
        restart: always
    
    nginx:
        container_name: nginx
        build: ./requirements/nginx
        image: nginx
        env_file: .env
        volumes:
            - wordpress_data:/var/www/html
        ports:
            - "443:443"
        networks:
            - inception
        depends_on:
            - wordpress
        restart: always

    redis:
        container_name: redis
        build: ./requirements/redis
        image: redis
        restart: unless-stopped
        volumes:
            - redis_data:/data
        ports:
            - "6379:6379"
        networks:
            - inception

    adminer:
        container_name: adminer
        build: ./requirements/adminer
        image: adminer
        restart: unless-stopped
        ports:
            - "8080:8080"
        networks:
            - inception
    vsftpd:
        container_name: vsftpd
        build: ./requirements/vsftpd
        image: vsftpd
        restart: unless-stopped
        environment:
            FTP_USER: ${FTP_USER}
            FTP_PWD: ${FTP_PWD}
        ports:
            - "21:21"
            - "10000-10010:10000-10010"
        volumes:
            - wordpress_data:/var/www/html

    static_site:
        container_name: static_site
        build: ./requirements/static-site
        image: static_site
        restart: on-failure
        volumes:
            - wordpress_data:/var/www/html
        networks:
            - inception

volumes:
    mariadb_data:
      driver: local
      driver_opts:
        type: none
        device: ~/42/inception/data/mariadb
        o: bind

    wordpress_data:
      driver: local
      driver_opts:
        type: none
        device: ~/42/inception/data/wordpress
        o: bind
    
    redis_data:

networks:
    inception:
        driver: bridge

secrets:
  mysql_password:
    file: ../secrets/mysql_password.txt
  mysql_root_password:
    file: ../secrets/mysql_root_password.txt

  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt