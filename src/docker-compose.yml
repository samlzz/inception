services:
    mariadb:
        container_name: mariadb
        build: ./requirements/mariadb
        image: inception-mariadb
        env_file: .env
        volumes:
            - mariadb_data:/var/lib/mysql
        networks:
            - inception
        restart: always
    
    wordpress:
        container_name: wordpress
        build: ./requirements/wordpress
        image: inception-wordpress
        env_file: .env
        volumes:
            - wordpress_data:/var/www/html
        networks:
            - inception
        depends_on:
            - mariadb
        restart: always
    
    nginx:
        container_name: nginx
        build: ./requirements/nginx
        image: inception-nginx
        env_file: .env
        volumes:
            - wordpress_data:/var/www/html
        ports:
            - "443:443"
        networks:
            - inception
        depends_on:
            - wordpress
        restart: always
    
volumes:
    mariadb_data:
    wordpress_data:

networks:
    inception:
        driver: bridge